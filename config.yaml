name: "V-Bot Climbing Gondola"
board: "ESP32-S3 SuperMini"

stepping:
  engine: RMT
  idle_ms: 250
  pulse_us: 4
  dir_delay_us: 1

kinematics:
  WallPlotter:
    left_axis: 0
    left_anchor_x: 0.000
    left_anchor_y: 0.000
    right_anchor_x: 1300.000   # 130cm anchor spacing — change via WebUI
    right_anchor_y: 0.000
    segment_length: 0.500

axes:
  shared_stepper_disable_pin: gpio.7:low

  x:
    steps_per_mm: 50.930
    max_rate_mm_per_min: 3000.000
    acceleration_mm_per_sec2: 200.000
    max_travel_mm: 1000.000
    motor0:
      step_pin: gpio.1
      direction_pin: gpio.2

  y:
    steps_per_mm: 50.930
    max_rate_mm_per_min: 3000.000
    acceleration_mm_per_sec2: 200.000
    max_travel_mm: 1000.000
    motor0:
      step_pin: gpio.4
      direction_pin: gpio.5:low  # Inverted: CW now winds IN (Retract)

  z:
    steps_per_mm: 100.000
    max_rate_mm_per_min: 1000.000
    max_travel_mm: 5.000
    servo:
      pwm_pin: gpio.6
      min_pulse_us: 500
      max_pulse_us: 2400
      output_min: 0.000
      output_max: 180.000

wifi:
  mode: AP
  ap:
    ssid: "V-Bot"
    password: "vbot1234"
